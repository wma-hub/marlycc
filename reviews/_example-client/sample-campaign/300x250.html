<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=300, height=250">
<title>APEX — 300x250</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 300px;
  height: 250px;
  overflow: hidden;
  font-family: 'Geologica', sans-serif;
  cursor: pointer;
}

.ad {
  width: 300px;
  height: 250px;
  position: relative;
  overflow: hidden;
}

/* Soft background — mimics BG-Soft from Echo DS */
.ad__bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 300px 200px at 200px 60px, #dde8f8 0%, transparent 70%),
    radial-gradient(ellipse 280px 240px at 60px 200px, #e8dff5 0%, transparent 70%),
    linear-gradient(160deg, #f2efe9 0%, #ebe6f6 50%, #dfe9f5 100%);
  animation: bg-drift 12s ease-in-out infinite alternate;
}

@keyframes bg-drift {
  0%   { filter: hue-rotate(0deg) brightness(1); }
  100% { filter: hue-rotate(6deg) brightness(1.02); }
}

/* Frosted glass banner — echo DS card style */
.ad__banner {
  position: absolute;
  left: 0;
  top: 36px;
  width: 248px;
  padding: 22px 28px 26px;
  border-radius: 0 16px 16px 0;
  background: linear-gradient(
    90deg,
    rgba(255, 255, 255, 0.72) 0%,
    rgba(255, 255, 255, 0.65) 100%
  );
  box-shadow:
    2px 4px 16px 6px rgba(0, 0, 0, 0.09),
    inset 2px 5px 18px 4px rgba(255, 255, 255, 0.32);
  display: flex;
  flex-direction: column;
  gap: 4px;
  opacity: 0;
  transform: translateX(-16px);
  animation: slide-in 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.25s;
}

@keyframes slide-in {
  to { opacity: 1; transform: translateX(0); }
}

.ad__label {
  font-family: 'Geologica', sans-serif;
  font-weight: 600;
  font-size: 9px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: #171e3b;
  opacity: 0.6;
  margin-bottom: 8px;
  opacity: 0;
  animation: fade-up 0.5s ease forwards 0.75s;
}

.ad__headline {
  font-family: 'Geologica', sans-serif;
  font-weight: 800;
  font-size: 22px;
  line-height: 1.12;
  color: #171e3b;
  opacity: 0;
  animation: fade-up 0.6s ease forwards 0.9s;
}

.ad__sub {
  font-family: 'Geologica', sans-serif;
  font-weight: 300;
  font-size: 11px;
  line-height: 1.5;
  color: #171e3b;
  opacity: 0;
  margin-top: 6px;
  animation: fade-up 0.5s ease forwards 1.1s;
}

/* CTA button */
.ad__cta {
  position: absolute;
  bottom: 28px;
  left: 28px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #171e3b;
  color: #fff;
  font-family: 'Geologica', sans-serif;
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 9px 18px;
  border-radius: 100px;
  border: none;
  cursor: pointer;
  opacity: 0;
  animation: fade-up 0.5s ease forwards 1.35s, pulse-cta 2.5s ease-in-out infinite 2s;
}

@keyframes pulse-cta {
  0%, 100% { box-shadow: 0 0 0 0 rgba(23,30,59,0.25); }
  50%       { box-shadow: 0 0 0 7px rgba(23,30,59,0); }
}

/* Logo mark — top right */
.ad__logo {
  position: absolute;
  top: 16px;
  right: 18px;
  font-family: 'Geologica', sans-serif;
  font-weight: 800;
  font-size: 12px;
  letter-spacing: 0.12em;
  color: #171e3b;
  text-transform: uppercase;
  opacity: 0;
  animation: fade-in 0.5s ease forwards 1.5s;
}

@keyframes slide-in {
  to { opacity: 1; transform: translateX(0); }
}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fade-in {
  to { opacity: 0.45; }
}
</style>
</head>
<body>
<div class="ad" onclick="window.open('about:blank')">
  <div class="ad__bg"></div>

  <div class="ad__banner">
    <p class="ad__label">Now in Beta</p>
    <p class="ad__headline">Built for<br>What's Next</p>
    <p class="ad__sub">The platform that grows<br>with your ambition.</p>
  </div>

  <button class="ad__cta">Get Early Access →</button>

  <div class="ad__logo">Apex</div>
</div>
</body>
</html>
