<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APEX — 160x600</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 160px;
  height: 600px;
  overflow: hidden;
  font-family: 'Geologica', sans-serif;
  cursor: pointer;
}

.ad {
  width: 160px;
  height: 600px;
  position: relative;
  overflow: hidden;
}

/* BG-Soft */
.ad__bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 200px 300px at 80px 150px, #dde8f8 0%, transparent 65%),
    radial-gradient(ellipse 180px 250px at 40px 450px, #e8dff5 0%, transparent 65%),
    linear-gradient(175deg, #f2efe9 0%, #ebe6f6 50%, #dfe9f5 100%);
  animation: bg-drift 14s ease-in-out infinite alternate;
}

@keyframes bg-drift {
  0%   { filter: brightness(1); }
  100% { filter: brightness(1.03) hue-rotate(4deg); }
}

/* Frosted glass banner — top-flush, spans width */
.ad__banner {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  padding: 28px 20px 24px;
  border-radius: 0 0 16px 0;
  background: linear-gradient(
    180deg,
    rgba(255, 255, 255, 0.75) 0%,
    rgba(255, 255, 255, 0.60) 100%
  );
  box-shadow:
    2px 4px 18px 6px rgba(0, 0, 0, 0.09),
    inset 2px 5px 20px 4px rgba(255, 255, 255, 0.32);
  display: flex;
  flex-direction: column;
  gap: 0;
  opacity: 0;
  transform: translateY(-14px);
  animation: slide-down 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.25s;
}

@keyframes slide-down {
  to { opacity: 1; transform: translateY(0); }
}

.ad__label {
  font-weight: 600;
  font-size: 8px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: #171e3b;
  opacity: 0.55;
  margin-bottom: 10px;
  opacity: 0;
  animation: fade-up 0.5s ease forwards 0.7s;
}

.ad__headline {
  font-weight: 800;
  font-size: 24px;
  line-height: 1.1;
  color: #171e3b;
  opacity: 0;
  animation: fade-up 0.6s ease forwards 0.85s;
}

/* Decorative element — orbiting rings, light version */
.ad__visual {
  position: absolute;
  left: 50%;
  top: 310px;
  transform: translate(-50%, -50%);
  width: 100px;
  height: 100px;
  opacity: 0;
  animation: fade-in 0.8s ease forwards 1.2s;
}

.ring {
  position: absolute;
  border-radius: 50%;
  top: 50%; left: 50%;
  border: 1px solid rgba(23, 30, 59, 0.18);
}

.ring--outer {
  width: 96px; height: 96px;
  transform: translate(-50%, -50%);
  animation: spin 28s linear infinite;
}

.ring--mid {
  width: 64px; height: 64px;
  transform: translate(-50%, -50%);
  border-style: dashed;
  border-color: rgba(23, 30, 59, 0.12);
  animation: spin 18s linear infinite reverse;
}

.ring--inner {
  width: 34px; height: 34px;
  transform: translate(-50%, -50%);
  border-color: rgba(23, 30, 59, 0.28);
  border-width: 1.5px;
  animation: spin 10s linear infinite;
}

.ring__dot {
  position: absolute;
  width: 7px; height: 7px;
  background: #171e3b;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0.8;
  animation: dot-pulse 2.5s ease-in-out infinite;
}

@keyframes spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to   { transform: translate(-50%, -50%) rotate(360deg); }
}

@keyframes dot-pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
  50%       { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
}

/* Sub-copy */
.ad__sub {
  position: absolute;
  bottom: 80px;
  left: 20px;
  right: 20px;
  font-weight: 300;
  font-size: 10px;
  line-height: 1.6;
  color: #171e3b;
  text-align: center;
  opacity: 0;
  animation: fade-up 0.5s ease forwards 1.5s;
}

/* CTA */
.ad__cta {
  position: absolute;
  bottom: 22px;
  left: 16px;
  right: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #171e3b;
  color: #fff;
  font-family: 'Geologica', sans-serif;
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 11px 16px;
  border-radius: 100px;
  border: none;
  cursor: pointer;
  opacity: 0;
  animation: fade-up 0.5s ease forwards 1.7s,
             pulse-cta 2.5s ease-in-out infinite 2.4s;
}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fade-in {
  to { opacity: 1; }
}

@keyframes pulse-cta {
  0%, 100% { box-shadow: 0 0 0 0 rgba(23,30,59,0.25); }
  50%       { box-shadow: 0 0 0 7px rgba(23,30,59,0); }
}
</style>
</head>
<body>
<div class="ad" onclick="window.open('about:blank')">
  <div class="ad__bg"></div>

  <div class="ad__banner">
    <p class="ad__label">Now in Beta</p>
    <p class="ad__headline">Built for<br>What's<br>Next</p>
  </div>

  <div class="ad__visual">
    <div class="ring ring--outer"></div>
    <div class="ring ring--mid"></div>
    <div class="ring ring--inner"></div>
    <div class="ring__dot"></div>
  </div>

  <p class="ad__sub">The platform that grows<br>with your ambition.</p>

  <button class="ad__cta">Get Early Access →</button>
</div>
</body>
</html>
