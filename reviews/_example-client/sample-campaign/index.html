<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NM1YHB24BE"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-NM1YHB24BE');

<link rel="icon" href="/mcc-logo-icon.svg" type="image/svg+xml">
<title>Echo — Ad Set Review</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#FAFAF8;color:#2C2C2A;padding:2rem 2rem 0}
.header{max-width:960px;margin:0 auto 2rem;padding-bottom:1.5rem;border-bottom:1px solid #E8E7E3}
.brand{margin-bottom:.75rem}.brand img{height:22px;width:auto;display:block}
h1{font-size:20px;font-weight:500;margin-bottom:.25rem}
.meta{font-size:13px;color:#888780}
.grid{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:2rem}
.ad-frame{background:#fff;border:1px solid #E8E7E3;border-radius:8px;overflow:hidden}
.ad-label{padding:10px 16px;font-size:12px;font-weight:500;color:#888780;border-bottom:1px solid #E8E7E3;display:flex;justify-content:space-between;align-items:center}
.ad-label span{color:#B4B2A9;font-weight:400}
.ad-preview{display:flex;align-items:center;justify-content:center;padding:2rem;background:#F5F5F3}
.ad-preview iframe{border:none;display:block}
footer{background:#FF6B00;margin-top:3rem;padding:20px 36px}
.footer-inner{display:flex;justify-content:space-between;align-items:center;max-width:960px;margin:0 auto}
.footer-logo img{height:22px;width:auto;display:block}
.footer-tagline{font-size:11px;color:#fff}
.footer-legal{font-size:11px;color:rgba(255,255,255,0.6);display:flex;gap:16px}
.footer-legal a{color:rgba(255,255,255,0.6);text-decoration:none}
</style>
</head>
<body>
<div class="header">
<div class="brand"><img src="/assets/logos/mcc-logo-wordmark-default.svg" alt="Marly Creative Concepts"></div>
<h1>Echo — Display Campaign</h1>
<div class="meta">Client: Echo &middot; 3 sizes &middot; Review v1</div>
</div>
<div class="grid">
<div class="ad-frame">
<div class="ad-label">300 &times; 250 <span>Medium Rectangle</span></div>
<div class="ad-preview"><iframe src="./300x250.html" width="300" height="250" scrolling="no"></iframe></div>
</div>
<div class="ad-frame">
<div class="ad-label">728 &times; 90 <span>Leaderboard</span></div>
<div class="ad-preview"><iframe src="./728x90.html" width="728" height="90" scrolling="no"></iframe></div>
</div>
<div class="ad-frame">
<div class="ad-label">160 &times; 600 <span>Wide Skyscraper</span></div>
<div class="ad-preview"><iframe src="./160x600.html" width="160" height="600" scrolling="no"></iframe></div>
</div>
</div>
<footer>
  <div class="footer-inner">
    <div class="footer-logo"><img src="/assets/logos/mcc-logo-wordmark-defwhite.svg" alt="Marly Creative Concepts"></div>
    <span class="footer-tagline">Production partner for agencies and in-house teams</span>
    <div class="footer-legal">
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
      <a href="/cookies">Cookies</a>
      <a href="/refunds">Refunds</a>
    </div>
  </div>
</footer>
</body>
</html>
