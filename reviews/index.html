<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="/mcc-logo-icon.svg" type="image/svg+xml">
<title>Marly Creative Concepts — Review Portal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #FAFAF8;
    color: #2C2C2A;
  }
  .card {
    text-align: center;
    max-width: 420px;
    padding: 3rem 2rem;
    margin: auto;
  }
  .logo {
    margin-bottom: 2rem;
  }
  h1 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 0.75rem;
    line-height: 1.3;
  }
  p {
    font-size: 15px;
    color: #73726C;
    line-height: 1.6;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: #D3D1C7;
    margin: 2rem auto;
  }
footer{background:#FF6B00;margin-top:3rem;padding:20px 36px}
.rv-footer-inner{display:flex;justify-content:space-between;align-items:center;max-width:960px;margin:0 auto}
.rv-footer-logo img{height:22px;width:auto;display:block}
.rv-footer-tagline{font-size:11px;color:#fff}
.rv-footer-legal{font-size:11px;color:rgba(255,255,255,0.6);display:flex;gap:16px}
.rv-footer-legal a{color:rgba(255,255,255,0.6);text-decoration:none}
</style>

<body>
  <div class="card">
    <div class="logo"><img src="/assets/logos/mcc-logo-wordmark-default.svg" alt="Marly Creative Concepts" style="height:22px;width:auto;display:block"></div>
    <h1>Ad review portal</h1>
    <p>If you've received a review link from us, navigate directly to the URL provided in your email to view your ad sets.</p>
    <div class="divider"></div>
  </div>
<footer>
  <div class="rv-footer-inner">
    <div class="rv-footer-logo"><img src="/assets/logos/mcc-logo-wordmark-defwhite.svg" alt="Marly Creative Concepts"></div>
    <span class="rv-footer-tagline">Production partner for agencies and in-house teams</span>
    <div class="rv-footer-legal">
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
      <a href="/cookies">Cookies</a>
      <a href="/refunds">Refunds</a>
    </div>
  </div>
</footer>
</body>
</html>
