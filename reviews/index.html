<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/mcc-logo-icon.svg" type="image/svg+xml">
<title>Marly Creative Concepts — Review Portal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #FAFAF8;
    color: #2C2C2A;
  }
  .card {
    text-align: center;
    max-width: 420px;
    padding: 3rem 2rem;
  }
  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888780;
    margin-bottom: 2rem;
  }
  h1 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 0.75rem;
    line-height: 1.3;
  }
  p {
    font-size: 15px;
    color: #73726C;
    line-height: 1.6;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: #D3D1C7;
    margin: 2rem auto;
  }
  .footer {
    font-size: 12px;
    color: #B4B2A9;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">Marly Creative Concepts</div>
    <h1>Ad review portal</h1>
    <p>If you've received a review link from us, navigate directly to the URL provided in your email to view your ad sets.</p>
    <div class="divider"></div>
    <p class="footer">Questions? Reach out to your Marly contact.</p>
  </div>
</body>
</html>
